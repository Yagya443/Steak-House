    <body>
        <div class="cursor"></div>
        <div class="main">
            <iframe
                class="maps"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d32603389.35734323!2d-29.35546875000001!3d4.039617826768437!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x10610d0354a37b45%3A0xe5cd5cab33a299d6!2sAfrican%20food!5e0!3m2!1sen!2sin!4v1764269014359!5m2!1sen!2sin"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <div id="right">
                <h2>Get In Touch</h2>
                <form>
                    <div class="name">
                        <input placeholder="First Name" />
                        <input placeholder="Last Name" />
                    </div>
                    <div class="contact">
                        <input type="tel" placeholder="Phone Number" />
                    </div>
                    <div class="email">
                        <input placeholder="Your Email" />
                    </div>
                    <textarea
                        class="help-box"
                        maxlength="200"
                        placeholder="How Can We Help?"
                    ></textarea>
    
                    <br />
                    <button>Submit</button>
                </form>
            </div>
        </div>
